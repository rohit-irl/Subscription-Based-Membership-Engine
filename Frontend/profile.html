<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | CapySphere</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Minimal, page-scoped styling (keeps your design language) */
        #profileStatus {
            font-size: 0.95rem;
            color: var(--text-muted);
            min-height: 1.2em;
        }
    </style>
</head>

<body class="dashboard-body">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-bolt"></i> Capy<span>Sphere</span>
            </a>
            <div class="nav-links">
                <!-- Links injected dynamically -->
            </div>
        </div>
    </nav>

    <main class="dashboard container">
        <div class="profile-header glass card animate"
            style="display: flex; flex-wrap: wrap; align-items: center; gap: 30px; margin-bottom: 30px;">
            <div class="profile-avatar"
                style="position: relative; overflow: hidden; border-radius: 50%; width: 120px; height: 120px;">
                <img src="https://ui-avatars.com/api/?name=User&background=10b981&color=fff&size=120"
                    alt="Profile Picture" id="profileImage" class="avatar-img" style="width: 100%; height: 100%;">
                <label for="profileImageInput" class="avatar-overlay">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="profileImageInput" accept="image/*" style="display: none;">
            </div>
            <div class="profile-info" style="flex-grow: 1;">
                <div
                    style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 15px;">
                    <div>
                        <h2 id="profileName" style="font-size: 2rem; margin-bottom: 5px;">—</h2>
                        <p style="color: var(--text-muted); font-size: 1rem;">
                            <i class="fas fa-envelope" style="color: var(--primary-color);"></i> <span
                                id="profileEmail">—</span>
                            <span class="divider">|</span>
                            <i class="fas fa-id-badge" style="color: var(--secondary-color);"></i> ID: <span
                                id="profileId">—</span>
                        </p>
                    </div>
                    <div class="profile-actions">
                        <a href="#" class="btn btn-outline" id="editProfileBtn"><i class="fas fa-pen"></i> Edit
                            Profile</a>
                    </div>
                </div>
                <p id="profileStatus" style="margin-top: 15px; font-size: 0.95rem;"></p>
            </div>
        </div>

        <div class="dashboard-grid animate" style="animation-delay: 0.1s;">
            <div class="left-col">
                <div class="dash-card glass card">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                        <h3>Subscription</h3>
                        <span id="subscriptionBadge" class="badge">Checking...</span>
                    </div>

                    <div class="subscription-details">
                        <div style="margin-bottom: 25px;">
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px;">Current Plan</p>
                            <p style="font-size: 1.25rem; font-weight: 600;" id="profilePlan">—</p>
                        </div>

                        <div style="margin-bottom: 30px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                <span style="color: var(--text-muted); font-size: 0.95rem;">Remaining Days</span>
                                <span style="font-weight: 700; font-size: 1.1rem; color: var(--text-main);"
                                    id="profileRemainingDays">—</span>
                            </div>
                            <div class="progress-container" style="margin: 0;">
                                <div class="progress-bar">
                                    <div class="progress-fill" id="subscriptionProgress" style="width: 0%;"></div>
                                </div>
                            </div>
                            <p
                                style="color: var(--text-muted); font-size: 0.85rem; margin-top: 10px; text-align: right;">
                                Expires on: <span id="profileExpiry" style="font-weight: 600;">—</span></p>
                        </div>

                        <button id="renewBtn" class="btn btn-primary btn-full"><i class="fas fa-sync-alt"></i> Renew
                            Subscription</button>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="dash-card glass card">
                    <div class="popular-badge" style="top: 15px; right: 15px;">Usage</div>
                    <h3 style="margin-bottom: 25px;">Downloads</h3>
                    <div>
                        <div style="margin-bottom: 20px;">
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px;">Downloads Used
                            </p>
                            <p style="font-size: 1.25rem; font-weight: 600;" id="profileDownloadsUsed">—</p>
                        </div>

                        <div style="margin-bottom: 30px;">
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px;">Download Limit
                            </p>
                            <p style="font-size: 1.25rem; font-weight: 600;" id="profileDownloadLimit">—</p>
                        </div>

                        <button id="upgradeBtn" class="btn btn-outline btn-full">Upgrade Plan</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div id="editProfileModal" class="modal">
            <div class="modal-content glass card">
                <span class="close-modal" id="closeEditModal">&times;</span>
                <h3 style="margin-bottom: 20px;">Edit Profile</h3>
                <form id="editProfileForm">
                    <div class="form-group">
                        <label for="editName">Full Name</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email Address</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
                </form>
            </div>
        </div>

        <div id="upgradePlanModal" class="modal">
            <div class="modal-content glass card">
                <span class="close-modal" id="closeUpgradeModal">&times;</span>
                <h3 style="margin-bottom: 20px;">Upgrade Plan</h3>
                <form id="upgradePlanForm">
                    <div class="form-group">
                        <label for="planSelect">Select New Plan</label>
                        <select id="planSelect" required>
                            <option value="Basic">Basic ($19/mo)</option>
                            <option value="Pro">Pro ($49/mo)</option>
                            <option value="Premium">Premium ($99/mo)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Confirm Upgrade</button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
