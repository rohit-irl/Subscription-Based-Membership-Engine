<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CapySphere</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-bolt"></i> Capy<span>Sphere</span>
            </a>
            <div class="nav-links">
                <a href="features.html">Features</a>
                <a href="pricing.html">Pricing</a>
                <a href="login.html" class="active">Login</a>
                <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card glass">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Log in to manage your subscription.</p>
            </div>
            <form id="authForm" data-redirect="dashboard.html">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required placeholder="••••••••">
                    <div style="text-align: right; margin-top: 5px;">
                        <a href="#" style="font-size: 0.8rem; color: var(--text-muted); text-decoration: none;">Forgot
                            Password?</a>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create one</a></p>
            </div>
        </div>
    </main>

    <div id="global-footer"></div>
    <script src="js/script.js"></script>
</body>

</html>
