<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SparkEngine</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-bolt"></i> Spark<span>Engine</span>
            </a>
            <div class="nav-links">
                <a href="features.html">Features</a>
                <a href="pricing.html">Pricing</a>
                <a href="login.html">Login</a>
                <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-card glass">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Start your 14-day free trial today.</p>
            </div>
            <form id="authForm" data-redirect="dashboard.html">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Choose Plan</label>
                    <select required>
                        <option value="">Select a plan</option>
                        <option value="basic">Basic Plan - $19/mo</option>
                        <option value="pro" selected>Pro Plan - $49/mo</option>
                        <option value="enterprise">Enterprise Plan - $99/mo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
